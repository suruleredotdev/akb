name: kb-viz CI

on:
  push:
    branches: ['**']
    paths: ['kb-viz/frontend/**']
  pull_request:
    paths: ['kb-viz/frontend/**']

defaults:
  run:
    working-directory: kb-viz/frontend

jobs:
  checks:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kb-viz/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: kb-viz/frontend/coverage/

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: kb-viz/frontend/dist/

  preview:
    name: Deploy Preview
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Derive preview slug
        id: slug
        run: |
          SLUG=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
        shell: bash
        working-directory: .

      - name: Deploy to GitHub Pages preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: preview/${{ steps.slug.outputs.slug }}
          keep_files: true

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            const url = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/${slug}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## kb-viz preview\n\n🔗 ${url}\n\nBuilt from ${context.sha.slice(0,7)}`,
            });
