name: kb-viz CI

on:
  push:
    branches: ['**']
    paths: ['kb-viz/frontend/**']
  pull_request:
    paths: ['kb-viz/frontend/**']

defaults:
  run:
    working-directory: kb-viz/frontend

jobs:
  checks:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kb-viz/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: kb-viz/frontend/coverage/
